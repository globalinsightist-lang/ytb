name: Autopilot Video Generator

# Generates, judges, renders, and uploads one Short per run, then commits the
# evolving prompt-feedback back to the repo. GitHub-hosted runners (4 vCPU /
# 16 GB) do the heavy MoviePy/FFmpeg rendering that Render's free tier can't.
#
# Cadence is driven externally by the Cloudflare Worker in cloudflare-cron/,
# which fires this workflow via the workflow_dispatch REST API every 4h. We do
# NOT use GitHub's native `schedule:` — it best-effort drops scheduled runs
# (worst for new repos / high load), which is exactly why it kept missing.
# Cloudflare cron is reliable; keeping `schedule:` too would double-fire and
# burn the YouTube quota.
#
# Cadence is capped by the YouTube Data API quota: videos.insert costs 1600
# units against the default 10,000/day, i.e. ~6 uploads/day. Running more often
# just burns quota and returns 403 quotaExceeded, so Cloudflare fires every 4h.

on:
  workflow_dispatch: {}        # triggered by the Cloudflare Worker (and manual runs from the Actions tab)

# Never run two iterations at once; queue instead of overlapping.
concurrency:
  group: autopilot
  cancel-in-progress: false

permissions:
  contents: write              # needed to push the learning state back

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 18        # caps a hung run; a normal render finishes well under this
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Materialize config.toml from secret
        env:
          CONFIG_TOML: ${{ secrets.CONFIG_TOML }}
        run: printf '%s' "$CONFIG_TOML" > config.toml

      - name: Run autopilot iteration
        env:
          YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
          YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
          YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
        run: uv run python run_autopilot.py

      - name: Commit learning state
        if: always()           # persist lessons even if upload failed
        run: |
          git config user.name "autopilot-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add autopilot/state.json autopilot/history.jsonl
          if git diff --cached --quiet; then
            echo "no state changes to commit"
          else
            git commit -m "autopilot: update learning state [skip ci]"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
