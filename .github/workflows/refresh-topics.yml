name: Daily Topic Refresh

# Once a day, pull Google Trends, have the LLM curate them into a handful of
# renderable Shorts topics, and commit autopilot/topics.txt back. The every-4h
# "Autopilot Video Generator" workflow then round-robins over those topics for
# the rest of the day (generate candidates -> LLM judge -> render winner ->
# upload). This is the cheap, no-render half of the system.
#
# Runs at 01:21 UTC daily — an off-peak minute (top of the hour gets delayed/dropped
# under GitHub load) and clear of the autopilot's :23 slots so the two workflows
# don't race on the git push-back.

on:
  schedule:
    - cron: "21 1 * * *"     # 01:21 UTC daily — off the top of the hour, which GitHub delays/drops under load
  workflow_dispatch: {}        # allow manual refresh from the Actions tab

concurrency:
  group: topic-refresh
  cancel-in-progress: false

permissions:
  contents: write              # needed to commit the refreshed topics back

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Materialize config.toml from secret
        env:
          CONFIG_TOML: ${{ secrets.CONFIG_TOML }}
        run: printf '%s' "$CONFIG_TOML" > config.toml

      - name: Refresh topics from Google Trends
        run: uv run python run_refresh_topics.py

      - name: Commit refreshed topics
        if: always()
        run: |
          git config user.name "autopilot-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add autopilot/topics.txt autopilot/state.json
          if git diff --cached --quiet; then
            echo "no topic changes to commit"
          else
            git commit -m "autopilot: refresh daily topics from Google Trends [skip ci]"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
